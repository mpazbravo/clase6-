<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Un fetch</title>
        <style>
            body {
                font-family: Helvetica, Arial, sans-serif;
				color:purple;
				background:orange;
            }
			table {
			   border-collapse:collapse;
			   text-align:left;
			}
			
			td, th{
			    border:1px solid cyan;
				padding:1rem
			}
        </style>
    </head>
    <body>
        <h1>≽^•⩊•^≼ (っ ͡ ͡º - ͡ ͡º ς)</h1>
        <ol id="estudiantes"></ol>
		<table>
		<thead>		
		 <tr>
		    <th>Asignatura</th>
		    <th>Grupo</th>
		    <th>Enfoque</th>
		 </tr>
		</thead>
		<tbody></tbody>
		</table>
        <script>
		const t = document.querySelector("table") 
            const URL = "https://api.myjson.online/v1/records/ae05a29a-ee8d-45ee-8a29-369296caa3a3";
            fetch(URL)
    .then((respuesta) => {
        if (!respuesta.ok) {
            throw new Error("Error HTTP: " + respuesta.status);
        }
        return respuesta.json();
    })
    .then((datos) => {
        var trabajo = datos.data;
        console.log("Datos recibidos:", trabajo);
        trabajo.forEach((x) => {
            if (x.ok == 1) {
                t.innerHTML += `<tr><td>${x.name}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
            }
        });
    })
    .catch((error) => {
        console.error("Algo salió mal:", error);
    });
        </script>
    </body>
</html>
